name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      REDIS_URL: redis://localhost:6379
      INTELLECTSAFE_CI_MODE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio

      - name: Run tests (with CI Mocking)
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --ignore=tests/test_all_providers.py --ignore=tests/test_providers.py --ignore=tests/test_all_apis.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install linters
        run: |
          pip install ruff bandit
          pip install -r backend/requirements.txt

      - name: Run ruff
        run: |
          ruff check backend/app/
          ruff format --check backend/app/

      - name: Run bandit (SAST)
        run: |
          bandit -r backend/app/ -ll

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
